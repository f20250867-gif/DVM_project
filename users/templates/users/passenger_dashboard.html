<!DOCTYPE html>
<html>
<head>
    <title>Passenger Dashboard</title>
</head>
<body style="font-family: Arial, sans-serif; margin: 40px;">

    <h1>Book a Carpool</h1>
    
    <div style="border: 1px solid #ccc; padding: 20px; max-width: 400px;">
        <h3>Where are you going?</h3>
        
        <form action="" method="POST">
            {% csrf_token %}
            <p>
                <label>Pickup Location:</label><br>
                <select name="pickup_node" required style="width: 100%; padding: 5px;">
                    <option value="" disabled selected>Select a starting point</option>
                    {% for node in nodes %}
                        <option value="{{ node.id }}">{{ node.name }}</option>
                    {% endfor %}
                </select>
            </p>
            
            <p>
                <label>Drop-off Location:</label><br>
                <select name="drop_node" required style="width: 100%; padding: 5px;">
                    <option value="" disabled selected>Select a destination</option>
                    {% for node in nodes %}
                        <option value="{{ node.id }}">{{ node.name }}</option>
                    {% endfor %}
                </select>
            </p>
            
            <button type="submit" style="background-color: #28a745; color: white; padding: 10px 15px; border: none; cursor: pointer; width: 100%;">
                Find a Ride
            </button>
        </form>
    </div>
    <div class="card mb-4 shadow-sm" style="border: 1px solid #ddd; padding: 20px; border-radius: 10px;">
    <h3>My Wallet</h3>
    
    <h4 class="text-success mt-3">
        Current Balance: $<span id="wallet-balance">{{ request.user.wallet_balance|floatformat:2 }}</span>
    </h4>

    <hr>

    <form id="topup-form" class="mt-3">
        {% csrf_token %}
        <div class="form-group mb-3">
            <label for="amount" class="form-label"><strong>Top-up Amount ($):</strong></label>
            <input type="number" id="amount" class="form-control" min="1" step="0.50" placeholder="Enter amount to add" required style="max-width: 200px;">
        </div>
        <button type="submit" class="btn btn-primary">Add Money</button>
    </form>

    <p id="wallet-message" class="mt-3" style="display: none; font-weight: bold;"></p>
</div>
<script>
    document.getElementById('topup-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const amount = document.getElementById('amount').value;
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
        const messageBox = document.getElementById('wallet-message');

        // Make the POST request to top up the wallet
        fetch('/api/wallet/topup/', {  
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrfToken
            },
            body: JSON.stringify({ amount: amount })
        })
        .then(response => response.json())
        .then(data => {
            if (data.new_balance !== undefined) {
                // Update the balance text instantly
                document.getElementById('wallet-balance').innerText = parseFloat(data.new_balance).toFixed(2);
                
                // Show success message
                messageBox.innerText = data.message;
                messageBox.style.color = 'green';
                messageBox.style.display = 'block';
                
                document.getElementById('amount').value = ''; 
                setTimeout(() => { messageBox.style.display = 'none'; }, 3000);
            } else {
                
                messageBox.innerText = data.error || "Something went wrong.";
                messageBox.style.color = 'red';
                messageBox.style.display = 'block';
            }
        })
        .catch(error => {
            console.error('Error:', error);
            messageBox.innerText = "Network error. Failed to top up.";
            messageBox.style.color = 'red';
            messageBox.style.display = 'block';
        });
    });
</script>

</body>
</html>
