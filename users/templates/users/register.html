{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Carpool App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">CarpoolApp</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/api-auth/login/">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow border-0 rounded-lg mt-5">
                    <div class="card-header bg-white text-center py-4">
                        <h3 class="font-weight-light my-2">Create an Account</h3>
                    </div>
                    <div class="card-body px-4 pt-4 pb-3">

                        <form method="POST" action="/api/signup/submit/">
                            {% csrf_token %}

                            <input type="text" name="username" required>

                            <select name="role" required>
                                <option value="driver">Driver</option>
                                <option value="passenger">Passenger</option>
                            </select>

                            <input type="password" name="password" required>

                            <button type="submit">Sign Up</button>
                        </form>
                    </div>
                    <div class="card-footer text-center py-3 bg-white">
                        <div class="small"><a href="/api-auth/login/" class="text-decoration-none">Have an account? Go
                                to login</a></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

   
</body>

</html>
